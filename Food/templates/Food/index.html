{% extends 'Food/base.html' %}
{% block body %}
  {% for item in item_list %}
    <div class="m-10 flex w-1/2 mx-auto">
      <div class="">
        <img class="w-64 rounded-lg" src="{{ item.item_image }}">
      </div>
      <div class="mx-16">
        <div class="font-bold">{{ item.item_name }}</div>
        <div>{{ item.item_desc }}</div>
        <div>{{ item.user_name }}</div>
        <div class="text-green-700 font-bold">${{ item.item_price }}</div>
      </div>
      <div class="">
        <a href="{% url 'Food:detail' item.id %}" class="bg-red-500 text-white font-bold px-4 py-2 rounded-md">Details</a>
      </div>
    </div>
  {% endfor %}
{% endblock %}
